version: '3.8'

services:
  nfc-reader:
    image: registry.apps.lasath.com/nfc-reader:latest
    container_name: nfc-reader
    privileged: true  # Required for USB device access by pcscd
    volumes:
      - /dev/bus/usb:/dev/bus/usb  # Pass through USB devices
    restart: unless-stopped
    environment:
      - PYTHONUNBUFFERED=1  # Ensure Python output is not buffered
      - LOG_LEVEL=INFO  # Set log level (DEBUG, INFO, WARNING, ERROR, CRITICAL)
      # MQTT configuration
      - MQTT_BROKER=your-mqtt-broker
      - MQTT_USERNAME=your-username
      - MQTT_PASSWORD=your-password